{% set href = module.button_link.url.href %}

{% if href %}
<a href="{{ href }}"
   {% if module.button_link.open_in_new_tab %}target="_blank" rel="noopener noreferrer"{% endif %}
   {% if module.button_link.no_follow %}rel="nofollow"{% endif %}
   class="header__cta-btn">
  {{ module.button_text }}
</a>
{% endif %}
