{% set href = module.link.url.href %}
{% set is_link = href and href != '' %}

{% if is_link %}
<a href="{{ href }}"
   {% if module.link.open_in_new_tab %}target="_blank" rel="noopener noreferrer"{% endif %}
   {% if module.link.no_follow %}rel="nofollow"{% endif %}
   class="header__topbar-link">
{% else %}
<span class="header__topbar-link">
{% endif %}

  <svg class="header__topbar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="15" height="15" aria-hidden="true">
    <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.61 21 3 13.39 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.58a1 1 0 01-.25 1.01l-2.2 2.2z"/>
  </svg>
  <span>{{ module.text }}</span>

{% if is_link %}</a>{% else %}</span>{% endif %}
