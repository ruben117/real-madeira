{% set logo_src = module.logo.src %}
{% set logo_alt = module.logo.alt or 'Real Madeira' %}
{% set logo_href = module.logo_link.url.href or '/' %}

<a href="{{ logo_href }}"
   {% if module.logo_link.open_in_new_tab %}target="_blank" rel="noopener noreferrer"{% endif %}
   class="header__logo-link"
   aria-label="{{ logo_alt }} — Ir al inicio">
  {% if logo_src %}
    <img src="{{ logo_src }}"
         alt="{{ logo_alt }}"
         loading="eager"
         class="header__logo-img">
  {% else %}
    {% module "site_logo_fallback"
      path="@hubspot/logo",
      img={"loading": "eager"}
    %}
  {% endif %}
</a>
